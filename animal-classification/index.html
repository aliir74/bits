<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>درخت رده‌بندی جانوران</title>
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf7;
    --ink: #1a1a1a;
    --muted: #6e6e73;
    --line: #d2d2d7;
    --card: #ffffff;
    --indigo: #5856d6; --indigo-soft: #ebeaff;
    --mint: #00a89e;   --mint-soft: #d8f5f3;
    --pink: #e8437f;   --pink-soft: #fde0ec;
    --amber: #d97706;  --amber-soft: #fff1dd;
    --green: #2ba84a;  --green-soft: #dff5e3;
    --purple: #af52de; --purple-soft: #f3e4fb;
    --rose: #ff375f;   --rose-soft: #ffe0e6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 32px 16px 80px;
    font-family: "Vazirmatn", -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.6;
    direction: rtl; -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 1400px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 16px; }
  h1 { font-size: 30px; font-weight: 800; margin: 0 0 6px; letter-spacing: -0.01em; }
  .subtitle { font-size: 13px; color: var(--muted); margin: 0; }
  .hint-wrap { text-align: center; }
  .hint {
    font-size: 12px; color: var(--muted);
    margin: 8px 0 24px;
    padding: 6px 14px; background: var(--card);
    border-radius: 999px; display: inline-block;
  }

  .breadcrumb {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 4px; margin-bottom: 24px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 10px 16px; font-size: 13px;
  }
  .crumb {
    cursor: pointer; padding: 4px 10px; border-radius: 8px;
    transition: background 0.15s;
  }
  .crumb:hover { background: var(--bg); }
  .crumb-rank { font-size: 10px; color: var(--muted); display: block; line-height: 1; margin-bottom: 2px; }
  .crumb-name { font-weight: 600; }
  .crumb-sep { color: var(--line); padding: 0 4px; align-self: center; }

  .tree { display: flex; flex-direction: column; align-items: center; }
  .level {
    width: 100%; display: flex; flex-direction: column;
    align-items: center; position: relative;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  .level-label {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted);
    background: var(--bg); padding: 0 8px; direction: ltr;
  }
  .level-label .fa {
    font-family: "Vazirmatn", sans-serif;
    display: block; font-size: 12px; color: var(--ink);
    font-weight: 600; text-transform: none; letter-spacing: 0; direction: rtl;
  }
  .siblings {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 8px; margin: 12px 0; max-width: 1200px; padding: 0 80px;
  }
  .node {
    background: var(--card); border: 1.5px solid var(--line);
    border-radius: 12px; padding: 8px 12px 10px;
    font-size: 13px; cursor: pointer;
    transition: all 0.18s ease;
    display: inline-flex; flex-direction: column;
    align-items: center; text-align: center;
    min-width: 96px; max-width: 140px; line-height: 1.3;
  }
  .node:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.1);
  }
  .node-img {
    width: 48px; height: 48px; border-radius: 50%;
    object-fit: cover; margin-bottom: 6px;
    background: var(--bg);
    border: 2px solid rgba(0,0,0,0.06);
    transition: opacity 0.3s ease;
    opacity: 0;
  }
  .node-img.loaded { opacity: 1; }
  .node-img.missing {
    background: var(--bg) center/40% no-repeat
      url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23c7c7cc"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8z"/></svg>');
    opacity: 1;
  }
  .node .fa-name { font-weight: 700; font-size: 13px; }
  .node .latin {
    font-size: 10px; color: var(--muted);
    font-style: italic; margin-top: 1px;
    direction: ltr; font-family: -apple-system, sans-serif;
  }
  .node.main {
    border-width: 2.5px; padding: 10px 16px 14px;
    transform: scale(1.06); z-index: 2;
    box-shadow: 0 8px 22px rgba(0,0,0,0.14);
  }
  .node.main .fa-name { font-size: 15px; }
  .node.main .node-img { width: 60px; height: 60px; }

  .node[data-color="indigo"]  { color: var(--indigo);  background: var(--indigo-soft);  border-color: var(--indigo); }
  .node[data-color="mint"]    { color: var(--mint);    background: var(--mint-soft);    border-color: var(--mint); }
  .node[data-color="pink"]    { color: var(--pink);    background: var(--pink-soft);    border-color: var(--pink); }
  .node[data-color="amber"]   { color: var(--amber);   background: var(--amber-soft);   border-color: var(--amber); }
  .node[data-color="green"]   { color: var(--green);   background: var(--green-soft);   border-color: var(--green); }
  .node[data-color="purple"]  { color: var(--purple);  background: var(--purple-soft);  border-color: var(--purple); }
  .node[data-color] .latin { color: currentColor; opacity: 0.7; }

  .connector { width: 2px; height: 22px; background: var(--line); }

  .species-final {
    margin-top: 28px; display: flex; align-items: center;
    gap: 28px; padding: 24px 32px;
    background: linear-gradient(135deg, var(--green-soft), var(--mint-soft));
    border-radius: 24px;
    box-shadow: 0 14px 36px rgba(43, 168, 74, 0.16);
    animation: fadeIn 0.3s ease; max-width: 800px;
  }
  .species-final .hero {
    width: 180px; height: 180px; border-radius: 20px;
    object-fit: cover; background: var(--card);
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    flex-shrink: 0;
  }
  .species-final .info { text-align: right; flex: 1; }
  .species-final h2 {
    margin: 0 0 4px; font-size: 28px; font-weight: 800; color: var(--green);
  }
  .species-final .latin-full {
    font-size: 17px; font-style: italic; color: var(--mint);
    direction: ltr; text-align: left; margin-bottom: 10px;
    font-family: -apple-system, sans-serif;
  }
  .species-final p { margin: 0 0 8px; font-size: 14px; color: var(--ink); }
  .species-final .wiki-link {
    display: inline-block; margin-top: 8px;
    font-size: 12px; color: var(--mint); text-decoration: none;
    border: 1px solid var(--mint); padding: 4px 10px;
    border-radius: 8px; direction: ltr;
  }
  .species-final .wiki-link:hover { background: var(--mint); color: white; }

  .footer { text-align: center; margin-top: 48px; font-size: 12px; color: var(--muted); }

  @media (max-width: 720px) {
    h1 { font-size: 22px; }
    .level-label { display: none; }
    .siblings { padding: 0 4px; gap: 6px; }
    .node { min-width: 80px; padding: 6px 8px 8px; }
    .node-img { width: 40px; height: 40px; }
    .node .fa-name { font-size: 12px; }
    .species-final { flex-direction: column; text-align: center; padding: 20px; }
    .species-final .info { text-align: center; }
    .species-final .hero { width: 140px; height: 140px; }
  }
</style>
</head>

// ───── Helpers ─────
function findPath(targetId, node = TAXONOMY, trail = []) {
  if (node.id === targetId) return [...trail, node];
  if (!node.children) return null;
  for (const child of node.children) {
    const r = findPath(targetId, child, [...trail, node]);
    if (r) return r;
  }
  return null;
}
function getNode(id) {
  const p = findPath(id);
  return p ? p[p.length - 1] : null;
}

// ───── Image cache + lazy loading ─────
// Each entry: { promise, data, resolved } — data/resolved set synchronously when promise settles.
const imageCache = new Map();
function fetchImage(wiki) {
  if (imageCache.has(wiki)) return imageCache.get(wiki).promise;
  const entry = { promise: null, data: null, resolved: false };
  entry.promise = (async () => {
    try {
      const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wiki.replace(/ /g, '_'))}`);
      if (!r.ok) { entry.resolved = true; return null; }
      const data = await r.json();
      const result = {
        thumb: data.thumbnail?.source || null,
        original: data.originalimage?.source || data.thumbnail?.source || null,
        title: data.title,
        url: data.content_urls?.desktop?.page || null
      };
      entry.data = result; entry.resolved = true;
      return result;
    } catch (e) { entry.resolved = true; return null; }
  })();
  imageCache.set(wiki, entry);
  return entry.promise;
}

function getImageSync(wiki) {
  const e = imageCache.get(wiki);
  return e?.resolved ? e.data : undefined;
}

function applyImage(imgEl, data) {
  if (data && data.thumb) {
    imgEl.src = data.thumb;
    if (imgEl.complete && imgEl.naturalWidth > 0) imgEl.classList.add("loaded");
    else {
      imgEl.onload = () => imgEl.classList.add("loaded");
      imgEl.onerror = () => imgEl.classList.add("missing");
    }
  } else {
    imgEl.classList.add("missing");
  }
}

function loadNodeImage(imgEl, wiki) {
  const cached = getImageSync(wiki);
  if (cached !== undefined) { applyImage(imgEl, cached); return; }
  fetchImage(wiki).then(d => applyImage(imgEl, d));
}

// ───── State ─────
const DEFAULT_PATH = ["eukarya", "animalia", "vertebrata", "chordata", "mammalia", "carnivora", "felidae", "panthera", "p_leo"];
let currentPath = DEFAULT_PATH.slice();

// ───── URL hash routing ─────
function parseHash() {
  const h = decodeURIComponent(location.hash.replace(/^#\/?/, ""));
  if (!h) return null;
  const ids = h.split("/").filter(Boolean);
  // Validate each id chains from root through the taxonomy.
  const validated = [];
  for (const id of ids) {
    const node = getNode(id);
    if (!node) break;
    validated.push(id);
  }
  return validated.length ? validated : null;
}

function writeHash(replace) {
  const newHash = "#/" + currentPath.join("/");
  if (location.hash === newHash) return;
  if (replace) history.replaceState(null, "", newHash);
  else history.pushState(null, "", newHash);
}

let suppressHashChange = false;
window.addEventListener("popstate", () => {
  if (suppressHashChange) return;
  const fromHash = parseHash() || DEFAULT_PATH.slice();
  if (fromHash.join("/") !== currentPath.join("/")) {
    currentPath = fromHash;
    render();
  }
});

// ───── Render ─────
function render() { renderBreadcrumb(); renderTree(); }

function renderBreadcrumb() {
  const crumb = document.getElementById("breadcrumb");
  crumb.innerHTML = "";
  currentPath.forEach((id, i) => {
    const node = getNode(id);
    if (!node) return;
    if (i > 0) {
      const s = document.createElement("span");
      s.className = "crumb-sep"; s.textContent = "›";
      crumb.appendChild(s);
    }
    const c = document.createElement("div");
    c.className = "crumb";
    c.innerHTML = `<span class="crumb-rank">${node.rankFa}</span><span class="crumb-name">${node.fa}</span>`;
    c.onclick = () => {
      const newPath = currentPath.slice(0, i + 1);
      if (newPath.join("/") === currentPath.join("/")) return;
      currentPath = newPath;
      writeHash(false);
      render();
    };
    crumb.appendChild(c);
  });
}

function renderTree() {
  const tree = document.getElementById("tree");
  tree.innerHTML = "";

  for (let i = 0; i < currentPath.length; i++) {
    const id = currentPath[i];
    const node = getNode(id);
    if (!node) continue;
    const siblings = i === 0 ? TAXONOMY.children : getNode(currentPath[i - 1]).children;
    tree.appendChild(buildLevel(node.rank, node.rankFa, siblings, id, i));
    tree.appendChild(buildConnector());
  }

  const last = getNode(currentPath[currentPath.length - 1]);
  if (last && last.children && last.children.length) {
    const childRank = last.children[0].rank;
    const childRankFa = last.children[0].rankFa;
    tree.appendChild(buildLevel(childRank, childRankFa, last.children, null, currentPath.length));
  } else {
    if (tree.lastChild && tree.lastChild.className === "connector") tree.removeChild(tree.lastChild);
    if (last) tree.appendChild(buildSpeciesCard(last));
  }

  setTimeout(() => {
    const lastEl = tree.lastChild;
    if (lastEl) lastEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }, 50);
}

function buildLevel(rank, rankFa, siblings, mainId, levelIndex) {
  const level = document.createElement("div");
  level.className = "level";

  const label = document.createElement("div");
  label.className = "level-label";
  label.innerHTML = `${rank}<span class="fa">${rankFa}</span>`;
  level.appendChild(label);

  const row = document.createElement("div");
  row.className = "siblings";
  siblings.forEach(s => {
    const n = document.createElement("div");
    n.className = "node" + (s.id === mainId ? " main" : "");
    n.setAttribute("data-color", RANK_COLORS[s.rank] || "indigo");

    const img = document.createElement("img");
    img.className = "node-img";
    img.alt = s.latin;
    n.appendChild(img);

    const name = document.createElement("span");
    name.className = "fa-name";
    name.textContent = s.fa;
    n.appendChild(name);

    const latin = document.createElement("span");
    latin.className = "latin";
    latin.textContent = s.latin;
    n.appendChild(latin);

    n.onclick = () => onNodeClick(s.id, levelIndex);
    row.appendChild(n);

    if (s.wiki) loadNodeImage(img, s.wiki);
    else img.classList.add("missing");
  });
  level.appendChild(row);
  return level;
}

function buildConnector() {
  const c = document.createElement("div");
  c.className = "connector";
  return c;
}

function buildSpeciesCard(node) {
  const card = document.createElement("div");
  card.className = "species-final";

  const hero = document.createElement("img");
  hero.className = "hero";
  hero.alt = node.latin;
  card.appendChild(hero);

  const info = document.createElement("div");
  info.className = "info";
  info.innerHTML = `
    <h2>${node.fa}</h2>
    <div class="latin-full">${node.latin}</div>
    <p>${node.info || ""}</p>
  `;
  card.appendChild(info);

  if (node.wiki) {
    fetchImage(node.wiki).then(d => {
      if (d) {
        if (d.original) hero.src = d.original;
        if (d.url) {
          const a = document.createElement("a");
          a.className = "wiki-link";
          a.href = d.url; a.target = "_blank"; a.rel = "noopener";
          a.textContent = "View on Wikipedia ↗";
          info.appendChild(a);
        }
      }
    });
  }
  return card;
}

function onNodeClick(id, levelIndex) {
  const newPath = currentPath.slice(0, levelIndex);
  newPath.push(id);
  if (newPath.join("/") === currentPath.join("/")) return; // no-op click
  currentPath = newPath;
  writeHash(false); // pushState — back button reverses navigation
  render();
}

function init() {
  const fromHash = parseHash();
  if (fromHash) currentPath = fromHash;
  else writeHash(true); // seed URL with default path so it's always shareable
  render();
}

init();
